services:
  # CKPool instance connected to Bitcoin Core (existing pool)
  ckpool-core:
    image: ghcr.io/gobrrrme/gobrrr-ckpool:latest
    container_name: warroom-ckpool-core
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 69420
        hard: 69420
    ports:
      - "3333:3333"
    volumes:
      - ckpool-core-socket:/tmp/ckpool
      - ckpool-core-logs:/var/log/ckpool
    env_file:
      - .env.knots
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - warroom-network

  # CKPool instance connected to Bitcoin Knots
  ckpool-knots:
    image: ghcr.io/gobrrrme/gobrrr-ckpool:latest
    container_name: warroom-ckpool-knots
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 69420
        hard: 69420
    ports:
      - "3334:3333"
    volumes:
      - ckpool-knots-socket:/tmp/ckpool
      - ckpool-knots-logs:/var/log/ckpool
    env_file:
      - .env.knots
    environment:
      - TZ=${TZ:-UTC}
      # Override to use Knots node credentials
      - BITCOIN_RPC_HOST=${KNOTS_RPC_HOST}
      - BITCOIN_RPC_PORT=${KNOTS_RPC_PORT:-8332}
      - BITCOIN_RPC_USER=${KNOTS_RPC_USER}
      - BITCOIN_RPC_PASS=${KNOTS_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=${KNOTS_ZMQ_HASHBLOCK}
      - STRATUM_PORT=3333
    networks:
      - warroom-network

  # WebUI with War Room enabled (port 3002 for dev)
  webui-warroom:
    image: gobrrr-webui:dev
    container_name: warroom-webui
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - ckpool-core-socket:/tmp/ckpool-core
      - ckpool-knots-socket:/tmp/ckpool-knots
      - webui-warroom-data:/app/data
    env_file:
      - .env.knots
    environment:
      - NODE_ENV=development
      - PORT=3000
      - CKPOOL_SOCKET_DIR=/tmp/ckpool-core
      - CKPOOL_KNOTS_SOCKET_DIR=/tmp/ckpool-knots
      - MEMPOOL_API_URL=${MEMPOOL_API_URL:-https://mempool.space/api}
      - TZ=${TZ:-UTC}
    networks:
      - warroom-network
    depends_on:
      - ckpool-core
      - ckpool-knots

volumes:
  ckpool-core-socket:
    driver: local
  ckpool-core-logs:
    driver: local
  ckpool-knots-socket:
    driver: local
  ckpool-knots-logs:
    driver: local
  webui-warroom-data:
    driver: local

networks:
  warroom-network:
    driver: bridge
